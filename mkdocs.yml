site_name: LoG-IV
site_description: Graph learning for irregular option-implied volatility surfaces.
site_url: https://ty-cheng.github.io/LoG-IV/
repo_url: https://github.com/TY-Cheng/LoG-IV
repo_name: TY-Cheng/LoG-IV
edit_uri: edit/main/docs/
docs_dir: docs
dev_addr: 127.0.0.1:8001
theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    logo: material/graph
    repo: fontawesome/brands/github
    annotation: material/arrow-right-circle
plugins:
  - search
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TY-Cheng/LoG-IV
      name: GitHub repository
copyright: Copyright © 2026 LoG-IV
nav:
  - Home: index.md
  - Results Snapshot: results_snapshot.md
  - Research Plan: paper_plan.md
  - Data: data.md
  - Benchmark Protocol: benchmark_protocol.md
  - Synthetic Benchmark: synthetic_benchmark.md
  - Graph: graph.md
  - Audit Prompts:
      - Development Audit: audit/development_audit_prompt.md
      - Manuscript Audit: audit/manuscript_audit_prompt.md
  - Future Work: future_work.md
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js
